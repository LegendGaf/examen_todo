<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bac 2026 — Connexion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .login-card h1 {
    font-size: 28px;
    margin-bottom: 8px;
    color: #1a1a2e;
  }
  .login-card p {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .form-group {
    text-align: left;
    margin-bottom: 24px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: #667eea;
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .emoji { font-size: 48px; margin-bottom: 16px; }
  .features {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    text-align: center;
  }
  .feature {
    flex: 1;
    background: #f8f9ff;
    border-radius: 10px;
    padding: 14px 8px;
  }
  .feature-icon { font-size: 22px; margin-bottom: 4px; }
  .feature-text { font-size: 11px; color: #666; }
</style>
</head>
<body>
<div class="login-card">
  <div class="emoji">📚</div>
  <h1>Bac 2026</h1>
  <p>Outil de révision complet<br>Calendrier + Todo list + Progression</p>
  
  <form id="loginForm">
    <div class="form-group">
      <label for="name">Ton prénom ou pseudo</label>
      <input type="text" id="name" placeholder="Ex: Ahmed, Fatima..." autocomplete="name" required maxlength="100">
    </div>
    <button type="submit" class="btn" id="submitBtn">Commencer les révisions</button>
    <div class="error" id="error"></div>
  </form>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">📅</div>
      <div class="feature-text">Calendrier jour par jour</div>
    </div>
    <div class="feature">
      <div class="feature-icon">✅</div>
      <div class="feature-text">Todo list par matière</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📊</div>
      <div class="feature-text">Suivi de progression</div>
    </div>
  </div>
</div>

<script>
  // Check if already logged in
  fetch('/api/me').then(r => r.json()).then(data => {
    if (data.loggedIn) window.location.href = '/app';
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');

    if (!name) {
      errorEl.textContent = 'Entre ton prénom ou pseudo';
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Connexion...';
    errorEl.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/app';
      } else {
        errorEl.textContent = data.error || 'Erreur';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'Erreur de connexion au serveur';
      errorEl.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Commencer les révisions';
  });
</script>
</body>
</html>
